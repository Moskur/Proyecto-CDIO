<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz – Pregunta {{ numero }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d0d0d;
      --card:   #161616;
      --border: #2a2a2a;
      --accent: #c8f060;
      --text:   #f0f0f0;
      --muted:  #888;
      --error:  #ff6b6b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 520px;
      animation: fadeUp .4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.75rem;
    }

    .progress-bar {
      flex: 1;
      height: 5px;
      background: #2a2a2a;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      width: {{ (numero / total * 100) | int }}%;
      transition: width .4s ease;
    }

    .progress-label {
      font-size: .8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.45rem;
      line-height: 1.3;
      margin-bottom: 1.75rem;
    }

    .opciones { display: flex; flex-direction: column; gap: .65rem; }

    .opciones input[type="radio"] { display: none; }

    .opciones label {
      display: block;
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      cursor: pointer;
      font-size: .95rem;
      font-weight: 500;
      padding: .85rem 1.1rem;
      transition: border-color .18s, background .18s;
    }

    .opciones label:hover { border-color: #555; }

    .opciones input[type="radio"]:checked + label {
      border-color: var(--accent);
      background: #1f2a0e;
      color: var(--accent);
    }

    .error-msg {
      color: var(--error);
      font-size: .82rem;
      margin-top: 1rem;
    }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      padding: .85rem;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: opacity .2s, transform .1s;
    }

    .btn:hover  { opacity: .88; }
    .btn:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="card">

    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <span class="progress-label">{{ numero }} / {{ total }}</span>
    </div>

    <h2>{{ pregunta.pregunta }}</h2>

    <form method="POST" action="/juego">
      <div class="opciones">
        {% for opcion in pregunta.opciones_mezcladas %}
          <span>
            <input type="radio" id="op{{ loop.index }}" name="respuesta" value="{{ opcion }}">
            <label for="op{{ loop.index }}">{{ opcion }}</label>
          </span>
        {% endfor %}
      </div>

      {% if error %}
        <p class="error-msg">{{ error }}</p>
      {% endif %}

      <button type="submit" class="btn">
        {% if numero == total %}Terminar quiz{% else %}Siguiente →{% endif %}
      </button>
    </form>

  </div>
</body>
</html>
