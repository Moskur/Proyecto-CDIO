<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz – Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --card:     #161616;
      --border:   #2a2a2a;
      --accent:   #c8f060;
      --text:     #f0f0f0;
      --muted:    #888;
      --error:    #ff6b6b;
      --radius:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 460px;
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      background: var(--accent);
      color: #0d0d0d;
      font-family: 'Syne', sans-serif;
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .3rem .7rem;
      border-radius: 99px;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      line-height: 1.15;
      margin-bottom: .4rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 2rem;
    }

    .field { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .45rem;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      padding: .75rem 1rem;
      outline: none;
      transition: border-color .2s;
    }

    input:focus { border-color: var(--accent); }

    .genero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
    }

    .genero-grid input[type="radio"] { display: none; }

    .genero-grid label {
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
      text-align: center;
      padding: .65rem;
      transition: border-color .2s, background .2s;
      margin: 0;
    }

    .genero-grid input[type="radio"]:checked + label {
      border-color: var(--accent);
      background: #1f2a0e;
      color: var(--accent);
    }

    .error-msg {
      color: var(--error);
      font-size: .8rem;
      margin-top: .4rem;
    }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      padding: .85rem;
      cursor: pointer;
      margin-top: .5rem;
      transition: opacity .2s, transform .1s;
    }

    .btn:hover  { opacity: .88; }
    .btn:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Quiz</span>
    <h1>¡Bienvenido!</h1>
    <p class="subtitle">Antes de empezar, cuéntanos un poco sobre ti.</p>

    <form method="POST" action="/">

      <div class="field">
        <label for="nombre">Tu nombre</label>
        <input type="text" id="nombre" name="nombre"
               placeholder="Ej: María González"
               value="{{ datos.get('nombre', '') }}">
        {% if error_nombre %}
          <p class="error-msg">{{ error_nombre }}</p>
        {% endif %}
      </div>

      <div class="field">
        <label>Género</label>
        <div class="genero-grid">
          {% for g in generos %}
            <span>
              <input type="radio" id="g{{ loop.index }}" name="genero" value="{{ g }}">
              <label for="g{{ loop.index }}">{{ g }}</label>
            </span>
          {% endfor %}
        </div>
        {% if error_genero %}
          <p class="error-msg">{{ error_genero }}</p>
        {% endif %}
      </div>

      <div class="field">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo"
               placeholder="Ej: maria@gmail.com"
               value="{{ datos.get('correo', '') }}">
        {% if error_correo %}
          <p class="error-msg">{{ error_correo }}</p>
        {% endif %}
      </div>

      <button type="submit" class="btn">Comenzar quiz →</button>

    </form>
  </div>
</body>
</html>
