<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – EcoMisión</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark: #1a5c38; --green-mid: #2e8b57; --green-pale: #e8f5ee;
      --blue-mid: #2196d3; --white: #ffffff;
      --gray-50: #f8fafb; --gray-100: #eef2f5; --gray-300: #c8d4dc;
      --gray-500: #6b8090; --gray-800: #1e2d3a;
      --error: #d32f2f;
      --radius-sm: 10px; --radius-lg: 28px;
      --shadow-card: 0 8px 32px rgba(26,92,56,.10), 0 2px 8px rgba(26,92,56,.07);
      --shadow-btn: 0 4px 16px rgba(46,139,87,.35);
    }
    body {
      background: linear-gradient(135deg, #1a2a1e 0%, #0d1b2a 100%);
      min-height: 100vh; font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 2rem 1rem;
    }
    .brand {
      display: flex; align-items: center; gap: .6rem;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--green-mid), var(--blue-mid));
      border-radius: 12px; display: flex; align-items: center;
      justify-content: center; font-size: 1.3rem;
    }
    .brand-name { font-size: 1rem; font-weight: 800; color: #c8e6c9; }
    .brand-tag  { font-size: .72rem; font-weight: 700; color: #4caf7d;
      background: rgba(76,175,61,.15); border: 1px solid rgba(76,175,80,.3);
      padding: .2rem .55rem; border-radius: 99px; margin-left: .3rem; }

    .card {
      background: var(--white); border-radius: var(--radius-lg);
      padding: 2.5rem 2rem 2rem; width: 100%; max-width: 400px;
      box-shadow: var(--shadow-card); border: 1px solid rgba(46,139,87,.12);
      animation: fadeUp .5s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }

    .lock-icon { font-size: 2.5rem; display: block; text-align: center; margin-bottom: 1rem; }
    h1 { font-size: 1.6rem; font-weight: 800; color: var(--gray-800);
      text-align: center; margin-bottom: .3rem; }
    .subtitle { color: var(--gray-500); font-size: .88rem; text-align: center;
      margin-bottom: 1.75rem; }

    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: .75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; color: var(--gray-500);
      margin-bottom: .45rem; }
    input[type="text"], input[type="password"] {
      width: 100%; background: var(--gray-50); border: 1.5px solid var(--gray-300);
      border-radius: var(--radius-sm); color: var(--gray-800); font-family: inherit;
      font-size: .95rem; padding: .8rem 1rem; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus { border-color: var(--green-mid); background: var(--white);
      box-shadow: 0 0 0 3px rgba(46,139,87,.15); }

    .error-msg { background: #fff5f5; border: 1px solid rgba(211,47,47,.2);
      color: var(--error); font-size: .82rem; padding: .6rem .9rem;
      border-radius: 8px; margin-bottom: 1rem; display: flex;
      align-items: center; gap: .4rem; }
    .error-msg::before { content: '⚠'; }

    .btn {
      width: 100%; background: linear-gradient(135deg, var(--green-mid), var(--blue-mid));
      color: var(--white); border: none; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 1rem; font-weight: 700;
      padding: .9rem; cursor: pointer; margin-top: .5rem;
      transition: opacity .2s, transform .15s; box-shadow: var(--shadow-btn);
    }
    .btn:hover  { opacity: .9; }
    .btn:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="brand">
    <div class="brand-icon">🌿</div>
    <span class="brand-name">EcoMisión</span>
    <span class="brand-tag">Admin</span>
  </div>

  <div class="card">
    <span class="lock-icon">🔐</span>
    <h1>Panel de administrador</h1>
    <p class="subtitle">Acceso restringido. Solo para administradores.</p>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <div class="field">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" placeholder="admin" autocomplete="off">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn">Entrar al panel 🔑</button>
    </form>
  </div>
</body>
</html>
